{% extends 'bakery/base.html' %}

{% block content %}

<style>
.form-section{
  min-height: 90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#fff5ee,#ffe4e1);
  padding:40px 20px;
}

.form-container{
  background:#ffffff;
  padding:45px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  width:100%;
  max-width:520px;
  text-align:center;
  animation: fadeIn 0.8s ease;
}

.form-container h2{
  margin-bottom:25px;
  color:#d2691e;
  font-size:28px;
}

.form-container input,
.form-container textarea{
  width:100%;
  padding:14px;
  margin-bottom:16px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
  transition:0.3s;
}

.form-container input:focus,
.form-container textarea:focus{
  border-color:#ff7f50;
  outline:none;
  box-shadow:0 0 8px rgba(255,127,80,0.4);
}

.form-container textarea{
  resize:none;
  height:110px;
}

.btn-order{
  background: linear-gradient(135deg,#ff7f50,#ff5722);
  color:white;
  border:none;
  padding:14px 35px;
  border-radius:30px;
  font-size:17px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.btn-order:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 25px rgba(0,0,0,0.2);
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>

<section class="form-section">
  <div class="form-container">

    <h2>🛒 Place Your Order</h2>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="tel" name="phone" placeholder="Phone Number" required>

      <input type="text" name="product" placeholder="Product Name" required>

      <textarea name="message" placeholder="Additional Notes"></textarea>

      <button type="submit" class="btn-order">
        🍰 Confirm Order
      </button>

    </form>

  </div>
</section>

{% endblock %}
