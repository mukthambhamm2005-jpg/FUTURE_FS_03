{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sweet Bakery</title>
    <link rel="stylesheet" href="{% static 'bakery/style.css' %}">
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'menu' %}">Menu</a>
    <a href="{% url 'order' %}">Order</a>
    <a href="{% url 'contact' %}">Contact</a>
    <a href="{% url 'cart' %}">Cart</a>
    
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
<style>
.menu-section {
    text-align: center;
    padding: 40px;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.menu-card {
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.menu-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.price {
    font-size: 18px;
    font-weight: bold;
    color: #d63384;
}

.btn-cart {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #ff69b4;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}

.btn-cart:hover {
    background: #ff1493;
}
</style>
